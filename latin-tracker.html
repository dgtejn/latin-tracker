<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latin Lessons — Attendance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f4;
  --surface: #ffffff;
  --border: #e8e4dc;
  --text: #1a1814;
  --muted: #8a8278;
  --present: #2d6a4f;
  --present-bg: #d8f3dc;
  --absent: #c1440e;
  --absent-bg: #fde8e0;
  --gold: #c9921a;
  --gold-bg: #fef3d8;
  --purple: #5c4b8a;
  --purple-bg: #ede9f7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* decorative latin quote strip */
.top-strip {
  background: var(--text);
  color: #faf8f4;
  text-align: center;
  padding: 8px;
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.85;
}

header {
  padding: 2.5rem 2rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
  max-width: 900px;
  margin: 0 auto;
}
.header-left h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 600;
  line-height: 1.1;
}
.header-left p {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
  font-weight: 300;
}
.mode-toggle {
  display: flex;
  gap: 6px;
}
.mode-btn {
  padding: 8px 18px;
  border: 1px solid var(--border);
  border-radius: 24px;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn:hover { border-color: var(--text); color: var(--text); }
.mode-btn.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

main { max-width: 900px; margin: 0 auto; padding: 2rem; }

/* summary row */
.summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 2.5rem;
}
.metric {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem 1.5rem;
}
.metric-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 6px;
}
.metric-val {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: var(--text);
}
.metric-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* cards */
.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 1rem;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  transition: box-shadow 0.2s;
}
.card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.2rem;
}
.avatar {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500; flex-shrink: 0;
  font-family: 'Playfair Display', serif;
}
.card-name { font-size: 16px; font-weight: 500; }
.card-rate { font-size: 12px; color: var(--muted); margin-top: 2px; }

.dots { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.2rem; }
.ldot {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  transition: transform 0.15s, background 0.15s;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  position: relative;
}
.ldot:hover { transform: scale(1.2); }
.ldot.present { background: var(--present); border-color: var(--present); }
.ldot.absent  { background: var(--absent);  border-color: var(--absent);  }
.ldot .lesson-tip {
  position: absolute;
  bottom: 130%; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg);
  font-size: 11px; padding: 4px 8px; border-radius: 6px;
  white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity 0.15s;
}
.ldot:hover .lesson-tip { opacity: 1; }

.card-stats { display: flex; gap: 16px; }
.cstat { text-align: center; }
.cstat-val { font-family: 'Playfair Display', serif; font-size: 20px; }
.cstat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 2px; }

.fire-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--gold-bg); color: var(--gold);
  font-size: 12px; font-weight: 500;
  padding: 4px 10px; border-radius: 20px;
  margin-top: 10px;
}

/* password overlay */
.overlay {
  position: fixed; inset: 0;
  background: rgba(26,24,20,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.pw-box {
  background: var(--surface);
  border-radius: 20px;
  padding: 2.5rem;
  width: 320px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.pw-box h2 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 8px; }
.pw-box p { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }
.pw-box input {
  width: 100%; padding: 10px 14px;
  border: 1px solid var(--border); border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  margin-bottom: 10px; background: var(--bg);
  outline: none; transition: border 0.2s;
}
.pw-box input:focus { border-color: var(--text); }
.pw-box input.error { border-color: var(--absent); }
.pw-box .btn-unlock {
  width: 100%; padding: 10px;
  background: var(--text); color: var(--bg);
  border: none; border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  cursor: pointer; margin-bottom: 8px;
}
.pw-box .btn-cancel {
  background: none; border: none;
  font-size: 13px; color: var(--muted);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
}

/* toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg);
  padding: 10px 22px; border-radius: 24px;
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
  z-index: 200;
}
.toast.show { opacity: 1; }

/* legend */
.legend {
  display: flex; gap: 20px; margin-bottom: 1.5rem;
  font-size: 12px; color: var(--muted); flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.ldot-sm { width: 12px; height: 12px; border-radius: 50%; }

@media (max-width: 600px) {
  header { padding: 1.5rem 1rem 1rem; }
  main { padding: 1.5rem 1rem; }
  .header-left h1 { font-size: 24px; }
}
</style>
</head>
<body>

<div class="top-strip">DISCIPULI · PRAESENTES · ABSENTES · SEMPER DISCENDUM</div>

<header>
  <div class="header-left">
    <h1>Latin Lessons</h1>
    <p>Summer 2026 &nbsp;·&nbsp; 10 Saturdays &nbsp;·&nbsp; 6 students</p>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-view" onclick="setMode('view')">View</button>
    <button class="mode-btn" id="btn-edit" onclick="requestEdit()">&#9998; Mark attendance</button>
  </div>
</header>

<main>
  <div class="summary" id="summary"></div>
  <div class="section-label">Student streaks</div>
  <div class="legend">
    <span class="legend-item"><span class="ldot-sm" style="background:var(--present)"></span>Present</span>
    <span class="legend-item"><span class="ldot-sm" style="background:var(--absent)"></span>Absent</span>
    <span class="legend-item"><span class="ldot-sm" style="background:var(--bg);border:1.5px solid var(--border)"></span>Upcoming</span>
  </div>
  <div class="cards" id="cards"></div>
</main>

<div class="overlay" id="overlay">
  <div class="pw-box">
    <h2>Teacher mode</h2>
    <p>Enter the password to mark attendance</p>
    <input type="password" id="pw-input" placeholder="Password" />
    <button class="btn-unlock" onclick="checkPw()">Unlock</button>
    <button class="btn-cancel" onclick="closeOverlay()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STUDENTS = ["Polina","Nadya","Katya","Ivana","Lena","Tanya"];
const TOTAL = 10;
const PASS = "latin2026";
const STORAGE_KEY = "latin_tracker_2026";

const COLORS = {
  Polina: {bg:'#d8f3dc', text:'#1b4332'},
  Nadya:  {bg:'#fde8e0', text:'#7c2d12'},
  Katya:  {bg:'#fce7f3', text:'#831843'},
  Ivana:  {bg:'#dbeafe', text:'#1e3a5f'},
  Lena:   {bg:'#ede9f7', text:'#3b2a6e'},
  Tanya:  {bg:'#fef3d8', text:'#7c4a00'},
};

const SATURDAYS = (() => {
  const d = []; let dt = new Date(2026, 5, 6);
  for (let i = 0; i < TOTAL; i++) { d.push(new Date(dt)); dt.setDate(dt.getDate()+7); }
  return d;
})();

const today = new Date();
const isPast = i => SATURDAYS[i] <= today;
const isToday = i => {
  const s = SATURDAYS[i];
  return s.getFullYear()===today.getFullYear()&&s.getMonth()===today.getMonth()&&s.getDate()===today.getDate();
};

let attendance = {};
let editMode = false;
let unlocked = false;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      STUDENTS.forEach(s => { attendance[s] = saved[s] || Array(TOTAL).fill(null); });
    } else {
      STUDENTS.forEach(s => { attendance[s] = Array(TOTAL).fill(null); });
    }
  } catch(e) {
    STUDENTS.forEach(s => { attendance[s] = Array(TOTAL).fill(null); });
  }
  render();
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(attendance)); } catch(e) {}
}

function requestEdit() {
  if (unlocked) { setMode('edit'); return; }
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-input').classList.remove('error');
}

function checkPw() {
  const v = document.getElementById('pw-input').value;
  if (v === PASS) {
    unlocked = true;
    closeOverlay();
    setMode('edit');
    showToast("Teacher mode unlocked");
  } else {
    const inp = document.getElementById('pw-input');
    inp.classList.add('error');
    inp.value = '';
    setTimeout(() => inp.classList.remove('error'), 1000);
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') checkPw(); });
document.getElementById('overlay').addEventListener('click', e => { if(e.target===document.getElementById('overlay')) closeOverlay(); });

function setMode(m) {
  editMode = m === 'edit';
  document.getElementById('btn-view').classList.toggle('active', !editMode);
  document.getElementById('btn-edit').classList.toggle('active', editMode);
  render();
}

function toggle(student, lesson) {
  if (!editMode || (!isPast(lesson) && !isToday(lesson))) return;
  const cur = attendance[student][lesson];
  attendance[student][lesson] = cur === null ? true : cur === true ? false : null;
  saveData(); render();
  const label = cur === null ? 'Present ✓' : cur === true ? 'Absent ✗' : 'Cleared';
  showToast(`${student} — ${label}`);
}

function countPresent(s) { return attendance[s].filter((v,i)=>v===true&&(isPast(i)||isToday(i))).length; }
function totalPast() { let n=0; for(let i=0;i<TOTAL;i++) if(isPast(i)||isToday(i)) n++; return n; }

function currentStreak(s) {
  let streak=0;
  for(let i=TOTAL-1;i>=0;i--) {
    if(!isPast(i)&&!isToday(i)) continue;
    if(attendance[s][i]===true) streak++; else break;
  }
  return streak;
}

function longestStreak(s) {
  let best=0,cur=0;
  for(let i=0;i<TOTAL;i++) {
    if(isPast(i)||isToday(i)) {
      if(attendance[s][i]===true){cur++;best=Math.max(best,cur);}else cur=0;
    }
  }
  return best;
}

function fmtDate(d) { return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }

function render() {
  const past = totalPast();
  const totalP = STUDENTS.reduce((a,s)=>a+countPresent(s),0);
  const classRate = past>0 ? Math.round(totalP/(STUDENTS.length*past)*100) : 0;
  const bestStreak = past>0 ? Math.max(...STUDENTS.map(s=>currentStreak(s))) : 0;
  const topS = past>0 ? STUDENTS.reduce((a,b)=>countPresent(a)>=countPresent(b)?a:b) : '—';

  document.getElementById('summary').innerHTML = `
    <div class="metric"><div class="metric-label">Lessons done</div><div class="metric-val">${past}<span style="font-size:16px;color:var(--muted)"> / ${TOTAL}</span></div></div>
    <div class="metric"><div class="metric-label">Class attendance</div><div class="metric-val">${classRate}<span style="font-size:16px;color:var(--muted)">%</span></div></div>
    <div class="metric"><div class="metric-label">Best streak</div><div class="metric-val">${bestStreak} <span style="font-size:20px">&#128293;</span></div></div>
    <div class="metric"><div class="metric-label">Star student</div><div class="metric-val" style="font-size:20px">${topS}</div></div>
  `;

  const cards = document.getElementById('cards');
  cards.innerHTML = '';

  STUDENTS.forEach(student => {
    const present = countPresent(student);
    const cs = currentStreak(student);
    const ls = longestStreak(student);
    const rate = past>0 ? Math.round(present/past*100) : 0;
    const col = COLORS[student] || {bg:'#f0f0f0',text:'#333'};

    let dots = '';
    for(let i=0;i<TOTAL;i++) {
      const val = attendance[student][i];
      const p = isPast(i)||isToday(i);
      let cls = p ? (val===true?'present':val===false?'absent':'') : '';
      const cur = editMode&&p ? 'pointer' : 'default';
      dots += `<div class="ldot ${cls}" onclick="toggle('${student}',${i})" style="cursor:${cur}" aria-label="Lesson ${i+1}">
        <span class="lesson-tip">Lesson ${i+1} · ${fmtDate(SATURDAYS[i])}</span>
      </div>`;
    }

    const fire = cs>=3 ? `<div class="fire-badge">&#128293; ${cs} in a row</div>` : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <div class="avatar" style="background:${col.bg};color:${col.text}">${student.slice(0,2)}</div>
        <div>
          <div class="card-name">${student}</div>
          <div class="card-rate">${present}/${past} lessons · ${rate}%</div>
        </div>
      </div>
      <div class="dots">${dots}</div>
      <div class="card-stats">
        <div class="cstat"><div class="cstat-val">${cs}</div><div class="cstat-label">Streak</div></div>
        <div class="cstat"><div class="cstat-val">${ls}</div><div class="cstat-label">Best</div></div>
        <div class="cstat"><div class="cstat-val">${rate}%</div><div class="cstat-label">Rate</div></div>
      </div>
      ${fire}
    `;
    cards.appendChild(card);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

loadData();
</script>
</body>
</html>
